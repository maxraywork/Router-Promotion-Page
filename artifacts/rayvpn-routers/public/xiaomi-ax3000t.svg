  <rect x="80" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="90" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="100" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="110" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="120" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="130" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="140" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="150" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="160" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="170" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="180" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="190" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="200" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="210" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="220" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="230" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="240" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="250" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
