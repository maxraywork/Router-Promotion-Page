  <rect x="290" y="268" width="30" height="8" rx="4" fill="#BBBBBB"/>

  <!-- Model label -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="11" fill="#999999" text-anchor="middle" letter-spacing="1">AX 3000T</text>

  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
