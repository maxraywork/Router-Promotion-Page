<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- shadow -->
  <ellipse cx="200" cy="305" rx="120" ry="10" fill="black" opacity="0.35"/>

  <!-- Antennas -->
  <rect x="78" y="30" width="8" height="90" rx="4" fill="#CCCCCC"/>
  <rect x="314" y="30" width="8" height="90" rx="4" fill="#CCCCCC"/>
  <rect x="143" y="20" width="8" height="80" rx="4" fill="#DDDDDD"/>
  <rect x="249" y="20" width="8" height="80" rx="4" fill="#DDDDDD"/>
  <!-- Antenna caps -->
  <circle cx="82" cy="30" r="6" fill="#BBBBBB"/>
  <circle cx="318" cy="30" r="6" fill="#BBBBBB"/>
  <circle cx="147" cy="20" r="5" fill="#CCCCCC"/>
  <circle cx="253" cy="20" r="5" fill="#CCCCCC"/>

  <!-- Main body -->
  <rect x="40" y="110" width="320" height="150" rx="16" fill="#F0F0F0"/>
  <!-- Top edge highlight -->
  <rect x="40" y="110" width="320" height="6" rx="3" fill="#FFFFFF" opacity="0.8"/>
  <!-- Body gradient overlay -->
  <rect x="40" y="116" width="320" height="144" rx="0" fill="url(#bodyGrad)" rx="16"/>

  <!-- Front face panel -->
  <rect x="55" y="125" width="290" height="118" rx="10" fill="#E8E8E8"/>
  <!-- Panel inner shadow -->
  <rect x="55" y="125" width="290" height="2" rx="1" fill="#FFFFFF" opacity="0.9"/>

  <!-- Brand stripe -->
  <rect x="55" y="125" width="290" height="32" rx="10" fill="#DC2C2C"/>
  <rect x="55" y="145" width="290" height="12" fill="#DC2C2C"/>

  <!-- XIAOMI text on stripe -->
  <text x="200" y="148" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">XIAOMI</text>

  <!-- LED indicators -->
  <circle cx="230" cy="170" r="4" fill="#22CC55" opacity="0.9"/>
  <circle cx="245" cy="170" r="4" fill="#22CC55" opacity="0.7"/>
  <circle cx="260" cy="170" r="4" fill="#FFAA00" opacity="0.8"/>
  <circle cx="275" cy="170" r="4" fill="#DC2C2C" opacity="0.6"/>

