  <rect x="270" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="280" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="290" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
  <rect x="300" y="207" width="3" height="20" rx="1" fill="#CCCCCC"/>
