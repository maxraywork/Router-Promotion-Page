  <rect x="80" y="160" width="110" height="28" rx="4" fill="#D8D8D8"/>
  <!-- Port slots -->
  <rect x="86" y="166" width="14" height="16" rx="2" fill="#BBBBBB"/>
  <rect x="104" y="166" width="14" height="16" rx="2" fill="#BBBBBB"/>
  <rect x="122" y="166" width="14" height="16" rx="2" fill="#BBBBBB"/>
  <rect x="140" y="166" width="14" height="16" rx="2" fill="#BBBBBB"/>
  <rect x="158" y="166" width="14" height="16" rx="2" fill="#DC2C2C" opacity="0.7"/>

